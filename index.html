<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ShellCheck Boston</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:-apple-system,'Helvetica Neue',Arial,sans-serif; background:#f5f5f5; color:#111; display:flex; flex-direction:column; height:100vh; overflow:hidden; }
button { cursor:pointer; font-family:inherit; }
input { font-family:inherit; }

#header { padding:14px 20px 12px; display:flex; align-items:center; justify-content:space-between; background:#fff; border-bottom:0.5px solid #ebebeb; flex-shrink:0; }
.logo { display:flex; align-items:center; gap:10px; }
.logo-dot { width:8px; height:8px; border-radius:50%; background:#16a34a; flex-shrink:0; }
.logo-name { font-weight:500; font-size:17px; letter-spacing:-0.4px; color:#111; }
.logo-sub { font-size:10px; color:#bbb; letter-spacing:0.1em; text-transform:uppercase; margin-top:1px; }
.view-btns { display:flex; gap:6px; }
.view-btn { padding:6px 14px; border-radius:20px; border:0.5px solid #ebebeb; font-weight:500; font-size:12px; transition:all 0.15s; background:#fff; color:#888; }
.view-btn.active { background:#111; color:#fff; border-color:#111; }

#disclaimer-bar { background:#fffbeb; border-bottom:0.5px solid #fef08a; padding:6px 16px; font-size:10px; color:#92400e; text-align:center; flex-shrink:0; letter-spacing:0.01em; }

#searchbar { padding:10px 16px; background:#fff; border-bottom:0.5px solid #ebebeb; display:flex; align-items:center; gap:8px; flex-shrink:0; position:relative; }
#search-input { flex:1; padding:8px 12px 8px 32px; border-radius:8px; border:0.5px solid #e5e5e5; font-size:13px; outline:none; background:#fafafa; color:#111; }
#search-input:focus { border-color:#111; background:#fff; }
#search-icon { position:absolute; left:26px; top:50%; transform:translateY(-50%); font-size:13px; pointer-events:none; color:#bbb; }
#search-clear { padding:4px 8px; border:none; background:none; color:#bbb; font-size:15px; display:none; }

#filterbar { padding:8px 16px; background:#fff; border-bottom:0.5px solid #ebebeb; display:flex; align-items:center; gap:6px; overflow-x:auto; flex-shrink:0; }
.filter-label { font-size:10px; color:#bbb; white-space:nowrap; font-weight:500; letter-spacing:0.08em; text-transform:uppercase; flex-shrink:0; }
.filter-btn { padding:4px 12px; border-radius:20px; white-space:nowrap; font-size:11px; font-weight:500; transition:all 0.15s; flex-shrink:0; border:0.5px solid #e5e5e5; background:#fff; color:#888; }
.filter-btn.active { border-color:#111; background:#111; color:#fff; }
.filter-divider { width:0.5px; height:16px; background:#ebebeb; flex-shrink:0; margin:0 2px; }

#cuisinebar { padding:6px 16px 8px; background:#fff; border-bottom:0.5px solid #ebebeb; display:flex; align-items:center; gap:5px; overflow-x:auto; flex-shrink:0; }
.cuisine-chip { padding:3px 11px; border-radius:20px; white-space:nowrap; font-size:11px; font-weight:500; border:0.5px solid #e5e5e5; background:#fff; color:#888; transition:all 0.15s; flex-shrink:0; }
.cuisine-chip.active { border-color:#111; background:#111; color:#fff; }

#main { display:flex; flex:1; overflow:hidden; }

#map-view { flex:1; display:flex; flex-direction:column; overflow:hidden; }
#map-wrap { flex:0 0 42vh; position:relative; }
#map-frame { width:100%; height:100%; border:none; display:block; }
#map-legend { position:absolute; bottom:10px; left:10px; background:rgba(255,255,255,0.97); border-radius:8px; padding:6px 12px; box-shadow:0 1px 6px rgba(0,0,0,0.08); display:flex; gap:10px; flex-wrap:wrap; z-index:5; }
.legend-item { display:flex; align-items:center; gap:5px; font-size:10px; color:#666; font-weight:500; }
.legend-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

#restaurant-list { flex:1; overflow-y:auto; background:#f5f5f5; position:relative; }
#list-header { padding:12px 16px 4px; font-size:10px; color:#bbb; font-weight:500; letter-spacing:0.08em; text-transform:uppercase; }
#list-cards { padding:6px 12px 20px; display:flex; flex-direction:column; gap:6px; }

.r-card { background:#fff; border:0.5px solid #ebebeb; border-radius:12px; padding:12px 14px; cursor:pointer; transition:all 0.15s; position:relative; z-index:1; }
.r-card:hover { border-color:#d0d0d0; }
.r-card.expanded { border-color:#d0d0d0; box-shadow:0 4px 20px rgba(0,0,0,0.1); z-index:10; }
.r-expand { animation: expandIn 0.15s ease; }
@keyframes expandIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }
.r-emoji { width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0; }
.r-info { flex:1; min-width:0; }
.r-name { font-weight:500; font-size:14px; color:#111; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.r-sub { font-size:11px; color:#bbb; margin-top:2px; }
.r-flags { display:flex; gap:4px; margin-top:5px; flex-wrap:wrap; }
.r-flag { font-size:10px; padding:2px 7px; border-radius:6px; font-weight:500; }
.flag-fryer { background:#fff7ed; color:#c2410c; border:0.5px solid #fed7aa; }
.flag-note { background:#f5f5f5; color:#888; border:0.5px solid #e5e5e5; }
.r-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; margin-left:auto; }

#list-view { flex:1; display:none; flex-direction:column; overflow-y:auto; padding:14px; }
.hood-card { background:#fff; border:0.5px solid #ebebeb; border-radius:12px; padding:12px 16px; cursor:pointer; display:flex; align-items:center; gap:12px; transition:all 0.15s; margin-bottom:6px; }
.hood-card.selected { border-color:#111; }
.section-label { font-size:10px; color:#bbb; font-weight:500; margin-bottom:10px; letter-spacing:0.08em; text-transform:uppercase; }

#sidebar { width:180px; border-right:0.5px solid #ebebeb; background:#fff; overflow-y:auto; padding:14px 10px; display:flex; flex-direction:column; flex-shrink:0; }
.sidebar-label { font-size:10px; color:#bbb; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:8px; padding-left:6px; }
.sidebar-section-label { font-size:10px; color:#bbb; font-weight:500; letter-spacing:0.08em; text-transform:uppercase; padding:0 6px; margin-bottom:5px; margin-top:2px; }
.sidebar-divider { height:0.5px; background:#f0f0f0; margin:10px 0; flex-shrink:0; }
.hood-btn { border-radius:8px; padding:6px 8px; border:0.5px solid transparent; background:transparent; display:flex; align-items:center; gap:7px; text-align:left; transition:all 0.15s; width:100%; }
.hood-btn:hover { background:#f5f5f5; }
.hood-btn.selected { background:#f5f5f5; border-color:#ddd; }
.hood-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.hood-btn-name { font-size:11px; font-weight:500; color:#444; }
.hood-btn.selected .hood-btn-name { color:#111; }
.hood-btn-sub { font-size:10px; color:#bbb; }
.sb-btn { width:100%; text-align:left; padding:6px 8px; border-radius:8px; border:0.5px solid transparent; background:transparent; font-size:12px; color:#666; font-weight:500; transition:all 0.15s; display:flex; align-items:center; gap:7px; }
.sb-btn:hover { background:#f5f5f5; }
.sb-btn.active { background:#f5f5f5; border-color:#ddd; color:#111; }
.sb-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:9999; backdrop-filter:blur(12px); padding:24px; }
.modal-sheet { background:#fff; border-radius:20px; width:100%; max-width:400px; padding:24px 22px 28px; box-shadow:0 8px 40px rgba(0,0,0,0.12); max-height:90vh; overflow-y:auto; }
.modal-handle { width:36px; height:3px; background:#e5e5e5; border-radius:2px; margin:0 auto 18px; }

#autocomplete { position:absolute; top:100%; left:16px; right:16px; background:#fff; border:0.5px solid #ebebeb; border-radius:10px; box-shadow:0 4px 16px rgba(0,0,0,0.08); z-index:500; display:none; max-height:200px; overflow-y:auto; }
.ac-item { padding:10px 14px; font-size:13px; cursor:pointer; display:flex; align-items:center; gap:10px; border-bottom:0.5px solid #f5f5f5; }
.ac-item:last-child { border-bottom:none; }
.ac-item:hover { background:#fafafa; }
.ac-name { font-weight:500; color:#111; }
.ac-sub { font-size:11px; color:#bbb; margin-top:1px; }

@keyframes bounce { 0%,80%,100%{transform:scale(0.6);opacity:0.4} 40%{transform:scale(1);opacity:1} }
.dot1,.dot2,.dot3 { width:7px;height:7px;border-radius:50%;background:#111;display:inline-block;animation:bounce 1.2s infinite;margin:0 3px; }
.dot2{animation-delay:0.2s;} .dot3{animation-delay:0.4s;}
</style>
</head>
<body>

<div id="header">
  <div class="logo">
    <div class="logo-dot"></div>
    <div>
      <div class="logo-name">ShellCheck</div>
      <div class="logo-sub">Boston · allergy menu checker</div>
    </div>
  </div>
  <div class="view-btns">
    <button class="view-btn active" onclick="setView('map')" id="btn-map">Map</button>
    <button class="view-btn inactive" onclick="setView('list')" id="btn-list">List</button>
    <button class="view-btn inactive" onclick="openInfoSheet()" id="btn-info">Guide</button>
  </div>
</div>

<div id="disclaimer-bar">
  ⚠️ ShellCheck is a menu info tool — not a safety guarantee. Always tell your server about your allergy.
</div>

<!-- Search bar with autocomplete -->
<div id="searchbar">
  <span id="search-icon">🔍</span>
  <input id="search-input" type="text" placeholder="Search restaurants or cuisines…" oninput="onSearch(this.value)" onfocus="onSearch(this.value)" onblur="setTimeout(hideAC,150)"/>
  <button id="search-clear" onclick="clearSearch()">✕</button>
  <div id="autocomplete"></div>
</div>



<div id="main">
  <div id="sidebar">
    <div id="sidebar-clear" style="display:none;margin-bottom:10px;">
      <button onclick="clearAll()" style="width:100%;padding:7px 8px;border-radius:8px;border:0.5px solid #e5e5e5;background:#f5f5f5;font-size:11px;font-weight:500;color:#666;text-align:center;cursor:pointer;">✕ Clear selections</button>
    </div>
    <div class="sidebar-section-label">Menu</div>
    <div id="sidebar-menu"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section-label">Cuisine</div>
    <div id="sidebar-cuisines"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section-label">Neighborhood</div>
    <div id="sidebar-hoods"></div>
  </div>

  <div id="map-view">
    <div id="map-wrap">
      <iframe id="map-frame"
        src="https://www.openstreetmap.org/export/embed.html?bbox=-71.1300,42.3300,-71.0100,42.4000&layer=mapnik"
        allowfullscreen>
      </iframe>
      <div id="map-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#16a34a"></div>No Shellfish Listed*</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ea580c"></div>Has Shellfish</div>
        <div class="legend-item"><div class="legend-dot" style="background:#dc2626"></div>Shellfish-Heavy</div>
        <div class="legend-item"><div class="legend-dot" style="background:#c2410c;border-radius:3px;width:14px;height:9px;"></div>Fryer Unknown</div>
      </div>
    </div>
    <div id="restaurant-list">
      <div id="list-overlay" onclick="closeExpand()" style="display:none;position:absolute;inset:0;background:rgba(0,0,0,0.25);z-index:5;"></div>
      <div id="list-header"></div>
      <div id="list-cards"></div>
    </div>
  </div>

  <div id="list-view">
    <div class="section-label">Neighborhoods</div>
    <div id="hood-rankings"></div>
    <div class="section-label" id="rest-section-label" style="margin-top:10px;"></div>
    <div id="list-view-cards" style="display:flex;flex-direction:column;gap:8px;"></div>
  </div>

</div>

<div id="modal-container"></div>

<script>
const APIFY_TOKEN = "YOUR_APIFY_TOKEN";

const MENU_TYPE = {
  none:  { label:"Not Detected on Menu",         sublabel:"Shellfish not found on menu reviewed*",  color:"#16a34a", bg:"#f0fdf4", border:"#86efac", emoji:"🟢" },
  some:  { label:"Shellfish Detected",           sublabel:"Shellfish dishes found on this menu",    color:"#ea580c", bg:"#fff7ed", border:"#fed7aa", emoji:"🟠" },
  heavy: { label:"Heavy Shellfish", sublabel:"Shellfish throughout this menu",       color:"#dc2626", bg:"#fef2f2", border:"#fca5a5", emoji:"🔴" },
};

// 🔴 Heavy Shellfish if shellfish is on menu AND fryer risk exists (unknown or shared)
// 🟠 Shellfish Detected if shellfish is on menu BUT no frying risk (dedicated fryer or no frying)
// 🟢 Not Detected if no shellfish on menu
function effectiveTier(r) {
  const hasShellfishOnMenu = r.menuType === "some" || r.menuType === "heavy";
  const fryerRisky = r.fryerStatus === "unknown" || r.fryerStatus === "shared";
  if (hasShellfishOnMenu && fryerRisky) return MENU_TYPE["heavy"];
  return MENU_TYPE[r.menuType];
}
//              "dedicated" = dedicated fryer (no shellfish fried here)
//              "shared" = confirmed shared fryer with shellfish
//              "na" = not applicable (no frying)
const FRYER_INFO = {
  unknown:   { label:"⚠️ Fryer Risk Unknown", style:"flag-fryer", tip:"We don't know if this kitchen fries shellfish in the same oil. Even if a dish contains no shellfish, frying in shared oil can trigger a serious allergic reaction. Always ask your server: <strong>'Is there a dedicated fryer that has never been used for shellfish?'</strong>" },
  dedicated: { label:"Fryer Risk: None Reported", style:"", tip:"A dedicated fryer (never used for shellfish) has been reported at this location. Always confirm with staff directly — fryer use can change without notice." },
  shared:    { label:"⚠️ Fryer Risk Detected", style:"flag-fryer", tip:"A fryer shared with shellfish has been reported here. <strong>Even shellfish-free dishes may be contaminated</strong> if fried in the same oil. Ask staff before ordering anything fried." },
  na:        { label:"No Frying", style:"flag-note", tip:"This restaurant does not appear to use a fryer." },
};

const CAVEAT = `⚠️ <strong>This is not a safety guarantee.</strong> "Not detected" only means shellfish wasn't found on the menu we reviewed — it does <strong>not</strong> mean the kitchen is shellfish-free. Menus change. Sauces, stocks, and shared equipment can still trigger a reaction. <strong style="color:#92400e;">Always tell your server about your allergy before ordering.</strong>`;

const NEIGHBORHOODS = [
  { id:"north-end",     name:"North End" },
  { id:"east-boston",   name:"East Boston" },
  { id:"seaport",       name:"Seaport" },
  { id:"back-bay",      name:"Back Bay" },
  { id:"south-end",     name:"South End" },
  { id:"beacon-hill",   name:"Beacon Hill" },
  { id:"fenway",        name:"Fenway" },
  { id:"cambridge",     name:"Cambridge" },
  { id:"jamaica-plain", name:"Jamaica Plain" },
];

const RESTAURANTS = [
  { id:1,  name:"Giulia", website:"https://giuliarestaurant.com",              neighborhood:"cambridge",     cuisine:"Italian",      menuType:"none",  fryerStatus:"na",        price:"$$$",  address:"1682 Massachusetts Ave, Cambridge", notes:"Not detected on menu reviewed" },
  { id:2,  name:"Tatte Bakery", website:"https://tattebakery.com",        neighborhood:"back-bay",      cuisine:"Cafe",         menuType:"none",  fryerStatus:"na",        price:"$",    address:"70 Exeter St, Boston",              notes:"Not detected on menu reviewed" },
  { id:3,  name:"Dumpling House", website:"https://dumplinghousecambridge.com",      neighborhood:"cambridge",     cuisine:"Chinese",      menuType:"some",  fryerStatus:"unknown",   price:"$",    address:"950 Massachusetts Ave, Cambridge",  notes:"Shellfish dumplings detected" },
  { id:4,  name:"Coppa", website:"https://coppaboston.com",               neighborhood:"south-end",     cuisine:"Italian",      menuType:"none",  fryerStatus:"na",        price:"$$$",  address:"253 Shawmut Ave, Boston",           notes:"Not detected on menu reviewed" },
  { id:5,  name:"Myers + Chang", website:"https://myersandchang.com",       neighborhood:"south-end",     cuisine:"Asian Fusion", menuType:"heavy", fryerStatus:"shared",    price:"$$",   address:"1145 Washington St, Boston",        notes:"Detected throughout menu" },
  { id:6,  name:"Row 34", website:"https://row34.com",              neighborhood:"seaport",       cuisine:"Seafood",      menuType:"heavy", fryerStatus:"shared",    price:"$$$",  address:"383 Congress St, Boston",           notes:"Detected throughout menu" },
  { id:7,  name:"Pastoral", website:"https://pastoralboston.com",            neighborhood:"back-bay",      cuisine:"American",     menuType:"none",  fryerStatus:"unknown",   price:"$$",   address:"345 Boylston St, Boston",           notes:"Not detected on menu reviewed" },
  { id:8,  name:"Trattoria Il Panino", website:"https://trattoriailpanino.com", neighborhood:"north-end",     cuisine:"Italian",      menuType:"some",  fryerStatus:"unknown",   price:"$$",   address:"11 Parmenter St, Boston",           notes:"Detected in pasta dishes" },
  { id:9,  name:"Beacon Hill Bistro", website:"https://beaconhillhotel.com/bistro",  neighborhood:"beacon-hill",   cuisine:"American",     menuType:"none",  fryerStatus:"unknown",   price:"$$$",  address:"25 Charles St, Boston",             notes:"Not detected on menu reviewed" },
  { id:10, name:"El Pelón Taqueria", website:"https://elpelon.com",   neighborhood:"fenway",        cuisine:"Mexican",      menuType:"none",  fryerStatus:"dedicated", price:"$",    address:"92 Peterborough St, Boston",        notes:"Not detected on menu reviewed" },
  { id:11, name:"Cinquecento", website:"https://cinquecentoboston.com",         neighborhood:"south-end",     cuisine:"Italian",      menuType:"none",  fryerStatus:"na",        price:"$$",   address:"500 Harrison Ave, Boston",          notes:"Not detected on menu reviewed" },
  { id:12, name:"Area Four", website:"https://areafour.com",           neighborhood:"cambridge",     cuisine:"Pizza",        menuType:"none",  fryerStatus:"unknown",   price:"$$",   address:"500 Technology Square, Cambridge",  notes:"Not detected on menu reviewed" },
];

const HOOD_EMOJI = {
  "north-end": "⚓",
  "east-boston": "✈️",
  "seaport": "🚢",
  "back-bay": "🎨",
  "south-end": "🌳",
  "beacon-hill": "🏛️",
  "fenway": "⚾",
  "cambridge": "🎓",
  "jamaica-plain": "🎸",
};
const EMOJI = { Italian:"🍝", Mexican:"🌮", Seafood:"🐟", Chinese:"🥢", "Asian Fusion":"🍜", Pizza:"🍕", Cafe:"☕", American:"🍔" };
const cEmoji = c => EMOJI[c] || "🍽";
const hEmoji = id => HOOD_EMOJI[id] || "📍";

const ALL_CUISINES = [...new Set(RESTAURANTS.map(r => r.cuisine))].sort();

let filterType = "all";
let filterFryerOnly = false;
let selectedHood = null;
let selectedCuisine = null;
let expandedId = null;
let searchQuery = "";

function getFiltered() {
  return RESTAURANTS.filter(r => {
    const t = effectiveTier(r);
    const effectiveType = t === MENU_TYPE["heavy"] ? "heavy" : t === MENU_TYPE["some"] ? "some" : "none";
    if (filterType !== "all" && effectiveType !== filterType) return false;
    if (filterFryerOnly && r.fryerStatus !== "unknown") return false;
    if (selectedHood && r.neighborhood !== selectedHood) return false;
    if (selectedCuisine && r.cuisine !== selectedCuisine) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      if (!r.name.toLowerCase().includes(q) && !r.cuisine.toLowerCase().includes(q) && !r.neighborhood.toLowerCase().includes(q)) return false;
    }
    return true;
  });
}

function render() {
  renderSidebar();
  renderCards();
  renderHoodList();
}

// ---- CUISINE CHIPS ----
function renderCuisineChips() {
  document.getElementById("cuisine-chips").innerHTML = ALL_CUISINES.map(c =>
    `<button class="cuisine-chip ${selectedCuisine===c?"active":""}" onclick="selectCuisine('${c}')">${cEmoji(c)} ${c}</button>`
  ).join("");
}

// ---- SEARCH / AUTOCOMPLETE ----
function onSearch(val) {
  searchQuery = val.trim();
  document.getElementById("search-clear").style.display = val ? "block" : "none";
  renderAC(val);
  render();
}

function renderAC(val) {
  const ac = document.getElementById("autocomplete");
  if (!val || val.length < 1) { ac.style.display = "none"; return; }
  const q = val.toLowerCase();
  const matches = RESTAURANTS.filter(r =>
    r.name.toLowerCase().includes(q) || r.cuisine.toLowerCase().includes(q)
  ).slice(0, 6);
  if (!matches.length) { ac.style.display = "none"; return; }
  ac.innerHTML = matches.map(r => {
    const t = effectiveTier(r);
    return `<div class="ac-item" onmousedown="selectFromAC(${r.id})">
      <span style="font-size:18px;">${cEmoji(r.cuisine)}</span>
      <div>
        <div class="ac-name">${r.name}</div>
        <div class="ac-sub">${r.cuisine} · ${r.neighborhood.replace(/-/g," ").replace(/\b\w/g,c=>c.toUpperCase())} · <span style="color:${t.color};font-weight:600;">${t.emoji} ${t.label}</span></div>
      </div>
    </div>`;
  }).join("");
  ac.style.display = "block";
}

function selectFromAC(id) {
  const r = RESTAURANTS.find(x => x.id === id);
  if (!r) return;
  document.getElementById("search-input").value = r.name;
  document.getElementById("search-clear").style.display = "block";
  hideAC();
  searchQuery = r.name;
  render();
  setTimeout(() => openModal(r), 100);
}

function hideAC() { document.getElementById("autocomplete").style.display = "none"; }

function clearSearch() {
  document.getElementById("search-input").value = "";
  document.getElementById("search-clear").style.display = "none";
  hideAC();
  searchQuery = "";
  render();
}

// ---- CARDS ----
function renderCards() {
  const filtered = getFiltered();
  const hood = NEIGHBORHOODS.find(n => n.id === selectedHood);
  document.getElementById("list-header").textContent =
    `${filtered.length} restaurant${filtered.length!==1?"s":""} · ${hood ? hood.name : "All Boston"}${selectedCuisine ? " · "+selectedCuisine : ""}`;

  const html = filtered.length ? filtered.map(r => cardHTML(r)).join("") :
    `<div style="text-align:center;padding:40px 20px;color:#9ca3af;"><div style="font-size:32px;margin-bottom:8px;">🔍</div><div style="font-weight:600;">No restaurants match</div></div>`;

  document.getElementById("list-cards").innerHTML = html;
  document.getElementById("list-view-cards").innerHTML = html;
  ["list-cards","list-view-cards"].forEach(id => {
    document.getElementById(id).querySelectorAll(".r-card").forEach((el,i) => {
      el.addEventListener("click", () => openModal(filtered[i]));
    });
  });

  const lbl = document.getElementById("rest-section-label");

  if (r.menuType === "none" && (r.fryerStatus === "unknown" || r.fryerStatus === "shared")) return true;
  return false;
}

async function scanMenu(id) {
  const r = RESTAURANTS.find(x=>x.id===id);
  if (!r) return;
  showScanModal(r,"scraping",null,null);
  let menuData=null;
  try { menuData=await scrapeYelp(r.yelp); } catch(e){}
  showScanModal(r,"analyzing",null,null);
  try {
    const analysis=await analyzeWithClaude(r.name,r.cuisine,menuData);
    showScanModal(r,"done",analysis,null);
  } catch(e) { showScanModal(r,"error",null,e.message); }
}

async function scrapeYelp(url) {
  const run=await(await fetch(`https://api.apify.com/v2/acts/petr_cermak~yelp-scraper/runs?token=${APIFY_TOKEN}`,{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({startUrls:[{url}],maxRequestsPerCrawl:1,scrapeReviews:false,scrapeMenu:true}),
  })).json();
  const runId=run?.data?.id;
  if (!runId) throw new Error("No run ID");
  for (let i=0;i<20;i++) {
    await new Promise(r=>setTimeout(r,3000));
    const s=await(await fetch(`https://api.apify.com/v2/actor-runs/${runId}?token=${APIFY_TOKEN}`)).json();
    if (s?.data?.status==="SUCCEEDED") break;
    if (s?.data?.status==="FAILED") throw new Error("Scrape failed");
  }
  const items=await(await fetch(`https://api.apify.com/v2/datasets/${run.data.defaultDatasetId}/items?token=${APIFY_TOKEN}`)).json();
  return items?.[0]||null;
}

async function analyzeWithClaude(name,cuisine,menuData) {
  let menuText=menuData?JSON.stringify(menuData).slice(0,3000):"";
  if (!menuText||menuText.length<20) menuText=`Restaurant: ${name}, Cuisine: ${cuisine}. No menu data.`;
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"claude-sonnet-4-20250514",max_tokens:1000,
      system:`You identify shellfish ingredients in restaurant menu items. Shellfish: shrimp, crab, lobster, clams, oysters, mussels, scallops, squid, octopus. Hidden sources: oyster sauce, fish sauce, worcestershire, bisque, bouillabaisse, paella, surimi, seafood stock, XO sauce.
Classify each dish:
- "safe": shellfish not found in name or description
- "caution": may contain hidden shellfish (sauce-based, unclear prep) or ambiguous
- "avoid": clearly contains shellfish
Never claim a dish is safe for allergy sufferers. Respond ONLY with JSON: {"dishes":[{"name":"...","risk":"safe"|"caution"|"avoid","reason":"...or null"}]}`,
      messages:[{role:"user",content:`Restaurant: ${name}\nCuisine: ${cuisine}\nMenu: ${menuText}`}],
    }),
  });
  const data=await res.json();
  const text=data?.content?.[0]?.text||"{}";
  return JSON.parse(text.replace(/```json|```/g,"").trim());
}
